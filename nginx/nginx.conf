events {
   worker_connections 1024;
}
http {

   server {
       listen 80;
       server_name gitlab_ci;
       location / {
           proxy_pass http://192.168.0.3:8000;
           proxy_set_header Host $host;
           proxy_set_header X-Real-IP $remote_addr;
           proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  }
          }

   server {
       listen 80;
       server_name monitoring.local;
       location / {
           proxy_pass http://192.168.0.2:3000;
           proxy_set_header Host $host;
           proxy_set_header X-Real-IP $remote_addr;
           proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  }
          }

   server {
       listen 80;
       server_name todo.local;
       location / {
           proxy_pass http://192.168.0.3:200;
           proxy_set_header Host $host;
           proxy_set_header X-Real-IP $remote_addr;
           proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  }
          }

     }