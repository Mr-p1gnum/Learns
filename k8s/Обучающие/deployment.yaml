apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-nginx
spec: 
  replicas: 5
  selector:
    matchLabels: 
      app: my-nginx
  template:
    metadata:
      labels:
        app: my-nginx
    spec:
      containers:
      - name: my-nginx
        image: my-nginx:1.4
        imagePullPolicy: Never
        ports:
        - containerPort: 8080